name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build all binaries
        run: make build

      - name: Run unit tests
        run: make test-unit

      - name: Run E2E tests
        run: make test-e2e

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Vet
        run: |
          go vet ./libs/cli/...
          go vet ./libs/sdk-go/...
          go vet ./libs/orchestrator/...
          go vet ./libs/plugin-storage-markdown/...
          go vet ./libs/plugin-tools-features/...
          go vet ./libs/plugin-transport-stdio/...
