name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install dependencies
        run: |
          python3 -c "
          import json
          lock = json.load(open('orchestra.lock'))
          for pkg in lock['packages']:
              url = pkg['source']['url']
              path = pkg['path']
              version = pkg['version']
              print(f'git clone --depth 1 --branch {version} {url} {path}')
          " | sh

      - name: Build all binaries
        run: make build

      - name: Run unit tests
        run: make test-unit

      - name: Run E2E tests
        run: make test-e2e

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install dependencies
        run: |
          python3 -c "
          import json
          lock = json.load(open('orchestra.lock'))
          for pkg in lock['packages']:
              url = pkg['source']['url']
              path = pkg['path']
              version = pkg['version']
              print(f'git clone --depth 1 --branch {version} {url} {path}')
          " | sh

      - name: Vet
        run: |
          python3 -c "
          import json
          lock = json.load(open('orchestra.lock'))
          for pkg in lock['packages']:
              if pkg['type'] != 'proto':
                  print(pkg['path'])
          " | while read path; do
            echo "go vet ./${path}/..."
            go vet "./${path}/..."
          done
