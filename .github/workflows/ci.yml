name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install dependencies
        run: python3 -c "import json;[__import__('subprocess').run(['git','clone','--depth','1','--branch',p['version'],p['source']['url'],p['path']],check=True) for p in json.load(open('orchestra.lock'))['packages']]"

      - name: Build all binaries
        run: make build

      - name: Run unit tests
        run: make test-unit

      - name: Run E2E tests
        run: make test-e2e

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install dependencies
        run: python3 -c "import json;[__import__('subprocess').run(['git','clone','--depth','1','--branch',p['version'],p['source']['url'],p['path']],check=True) for p in json.load(open('orchestra.lock'))['packages']]"

      - name: Vet
        run: python3 -c "import json;[print(p['path']) for p in json.load(open('orchestra.lock'))['packages'] if p['type'] not in ('proto',)]" | while read path; do go vet "./${path}/..."; done
