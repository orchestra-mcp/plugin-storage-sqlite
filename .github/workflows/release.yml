name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  GONOSUMCHECK: github.com/orchestra-mcp/*
  GONOSUMDB: github.com/orchestra-mcp/*

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: windows
            goarch: amd64
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Clone dependencies
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json, subprocess, sys
          lock = json.load(open("orchestra.lock"))
          for pkg in lock["packages"]:
              if pkg["type"] in ("proto",):
                  continue
              url = pkg["source"]["url"]
              path = pkg["path"]
              version = pkg["version"]
              ref = pkg["source"].get("reference", "master")
              result = subprocess.run(["git", "clone", "--depth", "1", "--branch", version, url, path],
                                      capture_output=True)
              if result.returncode != 0:
                  print(f"  Tag {version} not found for {path}, falling back to {ref}")
                  result = subprocess.run(["git", "clone", "--depth", "1", "--branch", ref, url, path],
                                          capture_output=True)
                  if result.returncode != 0:
                      print(f"  FATAL: clone failed for {path}", file=sys.stderr)
                      print(result.stderr.decode(), file=sys.stderr)
                      sys.exit(1)
              print(f"  Cloned {path}")
          PYEOF

      - name: Generate go.work
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json
          lock = json.load(open("orchestra.lock"))
          paths = [p["path"] for p in lock["packages"] if p["type"] != "proto" and "engine-rag" not in p.get("path","")]
          with open("go.work", "w") as f:
              f.write("go 1.24.0\n\nuse (\n")
              for p in paths:
                  f.write(f"\t./{p}\n")
              f.write(")\n")
          PYEOF
          cat go.work

      - name: Build all binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X github.com/orchestra-mcp/cli/internal.Version=${VERSION} \
                   -X github.com/orchestra-mcp/cli/internal.Commit=${COMMIT} \
                   -X github.com/orchestra-mcp/cli/internal.Date=${DATE}"

          export DIST="$(pwd)/dist"
          export LDFLAGS
          mkdir -p "${DIST}"

          python3 << 'PYEOF'
          import json, subprocess, sys, os
          lock = json.load(open("orchestra.lock"))
          dist = os.environ["DIST"]
          ldflags = os.environ["LDFLAGS"]
          goos = os.environ.get("GOOS", "")
          ext = ".exe" if goos == "windows" else ""
          for pkg in lock["packages"]:
              binary = pkg.get("binary")
              path = pkg.get("path", "")
              pkg_type = pkg.get("type", "")
              if not binary or pkg_type == "proto" or "engine-rag" in path:
                  continue
              out_name = binary + ext
              if pkg_type == "cli":
                  cmd = ["go", "build", "-ldflags", ldflags, "-o", f"{dist}/{out_name}", "."]
              else:
                  cmd = ["go", "build", "-o", f"{dist}/{out_name}", "./cmd/"]
              print(f"  Building {out_name} from {path}...")
              result = subprocess.run(cmd, capture_output=True, text=True, cwd=path)
              if result.returncode != 0:
                  print(f"  FAILED: {out_name}", file=sys.stderr)
                  print(result.stderr, file=sys.stderr)
                  sys.exit(1)
              print(f"  OK: {out_name}")
          PYEOF

      - name: Package tarball
        shell: bash
        run: |
          cd dist
          BINARIES=$(python3 -c "
          import json, os
          lock = json.load(open('../orchestra.lock'))
          goos = '${{ matrix.goos }}'
          ext = '.exe' if goos == 'windows' else ''
          bins = [p['binary'] + ext for p in lock['packages'] if p.get('binary') and p['type'] != 'proto' and 'engine-rag' not in p.get('path','')]
          print(' '.join(bins))
          ")
          echo "Packaging: ${BINARIES}"
          tar -czf orchestra-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz ${BINARIES}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: orchestra-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/orchestra-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Clone dependencies
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json, subprocess, sys
          lock = json.load(open("orchestra.lock"))
          for pkg in lock["packages"]:
              if pkg["type"] in ("proto",):
                  continue
              url = pkg["source"]["url"]
              path = pkg["path"]
              version = pkg["version"]
              ref = pkg["source"].get("reference", "master")
              result = subprocess.run(["git", "clone", "--depth", "1", "--branch", version, url, path],
                                      capture_output=True)
              if result.returncode != 0:
                  print(f"  Tag {version} not found for {path}, falling back to {ref}")
                  result = subprocess.run(["git", "clone", "--depth", "1", "--branch", ref, url, path],
                                          capture_output=True)
                  if result.returncode != 0:
                      print(f"  FATAL: clone failed for {path}", file=sys.stderr)
                      print(result.stderr.decode(), file=sys.stderr)
                      sys.exit(1)
              print(f"  Cloned {path}")
          PYEOF

      - name: Generate go.work
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json
          lock = json.load(open("orchestra.lock"))
          paths = [p["path"] for p in lock["packages"] if p["type"] != "proto" and "engine-rag" not in p.get("path","")]
          with open("go.work", "w") as f:
              f.write("go 1.24.0\n\nuse (\n")
              for p in paths:
                  f.write(f"\t./{p}\n")
              f.write(")\n")
          PYEOF
          cat go.work

      - name: Run unit tests
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json, subprocess, sys
          lock = json.load(open("orchestra.lock"))
          for pkg in lock["packages"]:
              path = pkg["path"]
              pkg_type = pkg["type"]
              if pkg_type in ("proto", "cli") or "engine-rag" in path:
                  continue
              print(f"  Testing {path}...")
              result = subprocess.run(["go", "test", "./...", "-v"], capture_output=True, text=True, cwd=path)
              print(result.stdout)
              if result.returncode != 0:
                  print(result.stderr, file=sys.stderr)
                  sys.exit(1)
          PYEOF
