name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install dependencies
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json, subprocess, sys
          lock = json.load(open("orchestra.lock"))
          for pkg in lock["packages"]:
              url = pkg["source"]["url"]
              path = pkg["path"]
              version = pkg["version"]
              ref = pkg["source"].get("reference", "master")
              result = subprocess.run(["git", "clone", "--depth", "1", "--branch", version, url, path],
                                      capture_output=True)
              if result.returncode != 0:
                  print(f"  Tag {version} not found for {path}, falling back to {ref}")
                  result = subprocess.run(["git", "clone", "--depth", "1", "--branch", ref, url, path],
                                          capture_output=True)
                  if result.returncode != 0:
                      print(f"  FATAL: clone failed for {path}", file=sys.stderr)
                      print(result.stderr.decode(), file=sys.stderr)
                      sys.exit(1)
              print(f"  Cloned {path}")
          PYEOF

      - name: Build all binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X github.com/orchestra-mcp/cli/internal.Version=${VERSION} \
                   -X github.com/orchestra-mcp/cli/internal.Commit=${COMMIT} \
                   -X github.com/orchestra-mcp/cli/internal.Date=${DATE}"

          mkdir -p dist
          go build -ldflags "${LDFLAGS}" -o dist/orchestra ./libs/cli/
          go build -o dist/orchestrator ./libs/orchestrator/cmd/
          go build -o dist/storage-markdown ./libs/plugin-storage-markdown/cmd/
          go build -o dist/tools-features ./libs/plugin-tools-features/cmd/
          go build -o dist/transport-stdio ./libs/plugin-transport-stdio/cmd/
          go build -o dist/tools-marketplace ./libs/plugin-tools-marketplace/cmd/

      - name: Package tarball
        run: |
          cd dist
          tar -czf orchestra-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
            orchestra orchestrator storage-markdown tools-features transport-stdio tools-marketplace

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: orchestra-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/orchestra-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install dependencies
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json, subprocess, sys
          lock = json.load(open("orchestra.lock"))
          for pkg in lock["packages"]:
              url = pkg["source"]["url"]
              path = pkg["path"]
              version = pkg["version"]
              ref = pkg["source"].get("reference", "master")
              result = subprocess.run(["git", "clone", "--depth", "1", "--branch", version, url, path],
                                      capture_output=True)
              if result.returncode != 0:
                  print(f"  Tag {version} not found for {path}, falling back to {ref}")
                  result = subprocess.run(["git", "clone", "--depth", "1", "--branch", ref, url, path],
                                          capture_output=True)
                  if result.returncode != 0:
                      print(f"  FATAL: clone failed for {path}", file=sys.stderr)
                      print(result.stderr.decode(), file=sys.stderr)
                      sys.exit(1)
              print(f"  Cloned {path}")
          PYEOF

      - name: Run unit tests
        shell: bash
        run: |
          python3 -c 'import json;[print(p["path"]) for p in json.load(open("orchestra.lock"))["packages"] if p["type"] not in ("proto","cli")]' | while read path; do
            echo "go test ./${path}/... -v"
            go test "./${path}/..." -v
          done
